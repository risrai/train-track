<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Train Status Checker</title>
<style>
  :root {
    --ink: #14212b;
    --muted: #5c6b76;
    --line: #dfe4e8;
    --panel: #f6f8f9;
    --blue: #0a5cc4;
    --green: #0f7a44;
    --amber: #b5720a;
    --red: #c62828;
    --rail: #8a94a0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    max-width: 560px;
    margin: 24px auto;
    padding: 0 16px 60px;
    line-height: 1.5;
    color: var(--ink);
    background: #fff;
  }
  h2 { margin-bottom: 2px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); margin-top: 0; font-size: 14px; }
  label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-top: 14px; margin-bottom: 5px; }
  input { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 15px; border: 1px solid #c9d0d6; border-radius: 8px; font-family: inherit; }
  input:focus { outline: 2px solid var(--blue); outline-offset: 1px; }
  .row-inline { display: flex; gap: 10px; }
  .row-inline > div { flex: 1; }
  button { font-size: 15px; padding: 11px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-family: inherit; }
  #checkBtn { width: 100%; margin-top: 16px; background: var(--blue); color: white; }
  #checkBtn:disabled { background: #a9b3bb; cursor: default; }
  #demoBtn { width: 100%; margin-top: 8px; background: transparent; color: var(--blue); border: 1px solid var(--blue); }

  .card { margin-top: 20px; padding: 16px; border-radius: 10px; background: var(--panel); display: none; }
  .card.show { display: block; }
  .card h3 { margin: 0 0 8px; font-size: 15px; }
  .grow-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .grow-row:last-child { border-bottom: none; }
  .grow-row .label { color: var(--muted); }
  .grow-row .value { font-weight: 600; text-align: right; }
  .delay-ontime { color: var(--green); }
  .delay-late { color: var(--red); }

  .exception { margin-top: 10px; padding: 10px; background: #fef7e0; border-radius: 8px; font-size: 13px; color: #7a5b00; }
  .error { margin-top: 16px; padding: 12px; border-radius: 8px; background: #fce8e6; color: var(--red); display: none; font-size: 14px; }
  .error.show { display: block; }
  .apikey-note { font-size: 12px; color: #888; margin-top: 4px; }

  /* progress */
  .progress-wrap { margin-top: 10px; }
  .progress-track { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .4s ease; }
  .progress-caption { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 5px; }

  /* route section */
  .route-section { margin-top: 26px; display: none; }
  .route-section.show { display: block; }
  .route-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
  .route-head h3 { margin: 0; font-size: 15px; }
  .route-tools { font-size: 12px; }
  .route-tools button { background: none; border: none; color: var(--blue); font-weight: 600; font-size: 12px; padding: 2px 4px; cursor: pointer; }

  .route-list { position: relative; margin-top: 12px; padding-left: 22px; }
  .route-list::before {
    content: ""; position: absolute; left: 6px; top: 6px; bottom: 6px; width: 2px; background: var(--line);
  }

  .stop { position: relative; padding: 9px 0; }
  .stop::before {
    content: ""; position: absolute; left: -22px; top: 15px; width: 10px; height: 10px; border-radius: 50%;
    background: #fff; border: 2px solid var(--rail);
  }
  .stop.departed::before { border-color: var(--green); background: var(--green); }
  .stop.upcoming::before { border-color: var(--rail); background: #fff; }
  .stop.current::before { border-color: var(--blue); background: var(--blue); box-shadow: 0 0 0 4px rgba(10,92,196,.15); }

  .stop-main { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 14.5px; }
  .stop-name { font-weight: 600; }
  .stop-code { font-weight: 400; color: var(--muted); font-size: 12.5px; }
  .stop-meta { display: flex; gap: 12px; color: var(--muted); font-size: 12.5px; margin-top: 2px; }
  .stop-meta .dist { font-variant-numeric: tabular-nums; }
  .stop.current .stop-name::after { content: " · currently here"; color: var(--blue); font-weight: 600; font-size: 12px; }

  .badge { font-size: 11.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
  .badge-ontime { background: #e6f4ea; color: var(--green); }
  .badge-late { background: #fdecea; color: var(--red); }
  .badge-na { background: var(--line); color: var(--muted); }

  .group { position: relative; padding: 6px 0; }
  .group::before {
    content: ""; position: absolute; left: -22px; top: 12px; bottom: 12px; width: 0; border-left: 2px dotted var(--rail);
  }
  .group-toggle {
    background: none; border: 1px dashed #c9d0d6; color: var(--muted); font-size: 12.5px; font-weight: 600;
    padding: 6px 10px; border-radius: 999px; width: auto;
  }
  .group-toggle:hover { border-color: var(--blue); color: var(--blue); }
  .group-body { display: none; margin-top: 8px; padding-left: 4px; border-left: 2px solid var(--line); margin-left: 3px; }
  .group-body.show { display: block; }
  .mini-stop { display: flex; align-items: center; justify-content: space-between; padding: 5px 0 5px 10px; font-size: 13px; }
  .mini-stop .mname { color: var(--ink); }
  .mini-stop .mcode { color: var(--muted); font-size: 11.5px; margin-left: 4px; }
  .mini-stop .mright { display: flex; align-items: center; gap: 8px; color: var(--muted); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<h2>🚆 Train Status Checker</h2>
<p class="sub">Enter a train number to see its live status and full route.</p>

<label for="apiKey">RailRadar API Key</label>
<input type="password" id="apiKey" placeholder="rr_live_...">
<p class="apikey-note">Stored only in this browser's local storage. Get a free key at railradar.in.</p>

<div class="row-inline">
  <div>
    <label for="trainNumber">Train Number</label>
    <input type="text" id="trainNumber" placeholder="e.g. 12919" inputmode="numeric">
  </div>
  <div>
    <label for="startDate">Start Date (optional)</label>
    <input type="date" id="startDate">
  </div>
</div>

<button id="checkBtn">Check Status</button>
<button id="demoBtn" type="button">Load sample data (no key needed)</button>

<div class="error" id="errorBox"></div>

<div class="card" id="resultCard">
  <div class="grow-row"><span class="label">Train</span><span class="value" id="rTrainName">-</span></div>
  <div class="grow-row"><span class="label">Status</span><span class="value" id="rStatus">-</span></div>
  <div class="grow-row"><span class="label">Current Delay</span><span class="value" id="rDelay">-</span></div>
  <div class="grow-row"><span class="label">Last Crossed</span><span class="value" id="rLastStation">-</span></div>
  <div class="grow-row"><span class="label">Next Station</span><span class="value" id="rNextStation">-</span></div>
  <div class="grow-row"><span class="label">Next ETA</span><span class="value" id="rNextEta">-</span></div>
  <div class="grow-row"><span class="label">Last Updated</span><span class="value" id="rUpdated">-</span></div>
  <div class="exception" id="exceptionBox" style="display:none;"></div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-caption">
      <span id="progressLeft">0 km</span>
      <span id="progressPct">0%</span>
      <span id="progressRight">0 km</span>
    </div>
  </div>
</div>

<div class="route-section" id="routeSection">
  <div class="route-head">
    <h3>Full Route</h3>
    <div class="route-tools">
      <button id="expandAllBtn" type="button">Expand all</button>
      <button id="collapseAllBtn" type="button">Collapse all</button>
    </div>
  </div>
  <div class="route-list" id="routeList"></div>
</div>

<script>
const apiKeyInput = document.getElementById("apiKey");
const trainNumberInput = document.getElementById("trainNumber");
const startDateInput = document.getElementById("startDate");
const checkBtn = document.getElementById("checkBtn");
const demoBtn = document.getElementById("demoBtn");
const errorBox = document.getElementById("errorBox");
const resultCard = document.getElementById("resultCard");
const routeSection = document.getElementById("routeSection");
const routeList = document.getElementById("routeList");

// ---- Restore last-used values from localStorage ----
window.addEventListener("DOMContentLoaded", () => {
  const savedKey = localStorage.getItem("railradar_api_key");
  const savedTrain = localStorage.getItem("railradar_train_number");
  const savedDate = localStorage.getItem("railradar_start_date");
  if (savedKey) apiKeyInput.value = savedKey;
  if (savedTrain) trainNumberInput.value = savedTrain;
  if (savedDate) startDateInput.value = savedDate;
});

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.classList.add("show");
  resultCard.classList.remove("show");
  routeSection.classList.remove("show");
}

function clearError() {
  errorBox.classList.remove("show");
  errorBox.textContent = "";
}

function formatTime(isoString) {
  if (!isoString) return "-";
  const d = new Date(isoString);
  return d.toLocaleString("en-IN", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
}

function getStationNameFromRoute(route, stationCode) {
  if (!route || !stationCode) return null;
  const entry = route.find(r => r.stationCode === stationCode);
  return entry ? entry.stationName : null;
}

function computeNextEta(route, nextHalt, delayMinutes) {
  if (!route || !nextHalt) return null;
  const entry = route.find(r => r.stationCode === nextHalt.stationCode);
  if (!entry || !entry.scheduledArrival) return null;
  const scheduledMs = new Date(entry.scheduledArrival).getTime();
  const estimatedMs = scheduledMs + (delayMinutes || 0) * 60000;
  return new Date(estimatedMs).toISOString();
}

// Pick the most meaningful delay figure for a route entry.
function entryDelay(entry) {
  if (entry.delayArrival !== undefined && entry.delayArrival !== null) return entry.delayArrival;
  if (entry.delayDeparture !== undefined && entry.delayDeparture !== null) return entry.delayDeparture;
  return null;
}

function delayBadgeHtml(mins, status) {
  if (mins === null || mins === undefined) {
    if (status !== "departed") return `<span class="badge badge-na">-</span>`;
    return `<span class="badge badge-ontime">On time</span>`;
  }
  if (mins <= 0) return `<span class="badge badge-ontime">On time</span>`;
  return `<span class="badge badge-late">+${mins} min</span>`;
}

function fmtDist(km) {
  if (km === undefined || km === null) return "-";
  return `${km.toFixed(1)} km`;
}

// Build the timeline: halts and the current-location station are shown in full,
// runs of ordinary pass-through stations between them collapse into an
// expandable group.
function renderRoute(data) {
  const route = data.route || [];
  const currentCode = data.currentLocation ? data.currentLocation.stationCode : null;

  let html = "";
  let pendingGroup = [];
  let groupIdx = 0;

  function flushGroup() {
    if (pendingGroup.length === 0) return;
    const first = pendingGroup[0];
    const last = pendingGroup[pendingGroup.length - 1];
    const id = `grp-${groupIdx++}`;
    html += `<div class="group">
      <button class="group-toggle" data-target="${id}" type="button">
        ▸ ${pendingGroup.length} intermediate station${pendingGroup.length > 1 ? "s" : ""} · ${fmtDist(first.distance)} – ${fmtDist(last.distance)}
      </button>
      <div class="group-body" id="${id}">
        ${pendingGroup.map(s => {
          const d = entryDelay(s);
          return `<div class="mini-stop">
            <span><span class="mname">${s.stationName}</span><span class="mcode">${s.stationCode}</span></span>
            <span class="mright"><span class="dist">${fmtDist(s.distance)}</span>${delayBadgeHtml(d, s.status)}</span>
          </div>`;
        }).join("")}
      </div>
    </div>`;
    pendingGroup = [];
  }

  route.forEach(entry => {
    const isAnchor = entry.isHalt || entry.stationCode === currentCode;
    if (!isAnchor) {
      pendingGroup.push(entry);
      return;
    }
    flushGroup();
    const isCurrent = entry.stationCode === currentCode;
    const statusClass = isCurrent ? "current" : entry.status; // "departed" | "upcoming"
    const d = entryDelay(entry);
    html += `<div class="stop ${statusClass}">
      <div class="stop-main">
        <span class="stop-name">${entry.stationName} <span class="stop-code">${entry.stationCode}</span></span>
        ${delayBadgeHtml(d, entry.status)}
      </div>
      <div class="stop-meta">
        <span class="dist">${fmtDist(entry.distance)}</span>
        ${entry.platform ? `<span>Platform ${entry.platform}</span>` : ""}
        ${entry.isHalt ? `<span>Halt</span>` : ""}
      </div>
    </div>`;
  });
  flushGroup();

  routeList.innerHTML = html;

  routeList.querySelectorAll(".group-toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const body = document.getElementById(btn.dataset.target);
      const nowShown = body.classList.toggle("show");
      btn.textContent = btn.textContent.replace(nowShown ? "▸" : "▾", nowShown ? "▾" : "▸");
    });
  });

  routeSection.classList.add("show");
}

function renderProgress(data) {
  const route = data.route || [];
  const totalDist = data.train && data.train.distance ? data.train.distance : (route.length ? route[route.length - 1].distance : 0);
  const currentEntry = data.currentLocation ? route.find(r => r.stationCode === data.currentLocation.stationCode) : null;
  const coveredDist = currentEntry ? currentEntry.distance : 0;
  const pct = totalDist > 0 ? Math.min(100, Math.round((coveredDist / totalDist) * 100)) : 0;

  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressLeft").textContent = `${coveredDist.toFixed(0)} km covered`;
  document.getElementById("progressRight").textContent = `${totalDist.toFixed(0)} km total`;
}

function renderSummary(d) {
  document.getElementById("rTrainName").textContent = `${d.trainNumber} - ${d.trainName}`;
  document.getElementById("rStatus").textContent = d.status;

  const delayEl = document.getElementById("rDelay");
  const delay = d.delayMinutes ?? 0;
  delayEl.textContent = delay > 0 ? `${delay} min late` : "On time";
  delayEl.className = "value " + (delay > 0 ? "delay-late" : "delay-ontime");

  if (d.currentLocation) {
    const stationName = getStationNameFromRoute(d.route, d.currentLocation.stationCode);
    const namePart = stationName ? `${stationName} (${d.currentLocation.stationCode})` : d.currentLocation.stationCode;
    document.getElementById("rLastStation").textContent = `${namePart} - ${d.currentLocation.status}`;
  } else {
    document.getElementById("rLastStation").textContent = "-";
  }

  document.getElementById("rNextStation").textContent = d.nextHalt
    ? `${d.nextHalt.stationName} (${d.nextHalt.stationCode})`
    : "-";

  const etaIso = computeNextEta(d.route, d.nextHalt, delay);
  document.getElementById("rNextEta").textContent = etaIso ? formatTime(etaIso) : "-";

  document.getElementById("rUpdated").textContent = formatTime(d.lastUpdatedAt);

  const exceptionBox = document.getElementById("exceptionBox");
  if (d.exceptions && d.exceptions.length > 0) {
    exceptionBox.style.display = "block";
    exceptionBox.textContent = "⚠️ " + d.exceptions.map(e => e.message).join(" | ");
  } else {
    exceptionBox.style.display = "none";
  }

  resultCard.classList.add("show");
  renderProgress(d);
  renderRoute(d);
}

async function checkStatus() {
  clearError();
  const apiKey = apiKeyInput.value.trim();
  const trainNumber = trainNumberInput.value.trim();
  const startDate = startDateInput.value;

  if (!apiKey) return showError("Enter your RailRadar API key.");
  if (!trainNumber) return showError("Enter a train number.");

  localStorage.setItem("railradar_api_key", apiKey);
  localStorage.setItem("railradar_train_number", trainNumber);
  if (startDate) {
    localStorage.setItem("railradar_start_date", startDate);
  } else {
    localStorage.removeItem("railradar_start_date");
  }

  checkBtn.disabled = true;
  checkBtn.textContent = "Checking...";

  try {
    let url = `https://api.railradar.in/v1/trains/${encodeURIComponent(trainNumber)}/live`;
    if (startDate) url += `?date=${startDate}`;

    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${apiKey}` }
    });
    const json = await res.json();

    if (!res.ok || !json.success) {
      const msg = json?.error?.message || `Request failed (${res.status})`;
      showError(msg);
      return;
    }

    renderSummary(json.data);
  } catch (err) {
    showError("Network or parsing error: " + err.message);
  } finally {
    checkBtn.disabled = false;
    checkBtn.textContent = "Check Status";
  }
}

checkBtn.addEventListener("click", checkStatus);

document.getElementById("expandAllBtn").addEventListener("click", () => {
  routeList.querySelectorAll(".group-body").forEach(b => b.classList.add("show"));
  routeList.querySelectorAll(".group-toggle").forEach(btn => { btn.textContent = btn.textContent.replace("▸", "▾"); });
});
document.getElementById("collapseAllBtn").addEventListener("click", () => {
  routeList.querySelectorAll(".group-body").forEach(b => b.classList.remove("show"));
  routeList.querySelectorAll(".group-toggle").forEach(btn => { btn.textContent = btn.textContent.replace("▾", "▸"); });
});

// Demo data lets you try the UI without an API key, using a captured
// live-status response (Secunderabad Duronto Express, 12286).
demoBtn.addEventListener("click", () => {
  clearError();
  fetch("data:application/json;base64," + DEMO_DATA_B64)
    .then(r => r.json())
    .then(json => renderSummary(json.data))
    .catch(err => showError("Couldn't load sample data: " + err.message));
